name: Update AUR Nightly Package

on:
  schedule:
    - cron: "20 * * * *" # Run every hour at :20
  workflow_dispatch:
    inputs:
      force_publish:
        description: "Force publish current version to AUR"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check for updates
        id: check
        run: |
          bun scripts/update.ts --check --channel nightly --pkgbuild packaging/nightly/PKGBUILD > check_result.json
          cat check_result.json

          echo "update_available=$(jq -r '.update_available' check_result.json)" >> "$GITHUB_OUTPUT"
          echo "latest_version=$(jq -r '.latest_pkgver' check_result.json)" >> "$GITHUB_OUTPUT"
          echo "latest_commit=$(jq -r '.latest_commit' check_result.json)" >> "$GITHUB_OUTPUT"

      - name: Update packaging/nightly/PKGBUILD
        if: steps.check.outputs.update_available == 'true' && !inputs.force_publish
        run: bun scripts/update.ts --update --channel nightly --pkgbuild packaging/nightly/PKGBUILD

      - name: Commit channel PKGBUILD
        if: steps.check.outputs.update_available == 'true' && !inputs.force_publish
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add packaging/nightly/PKGBUILD
          git commit -m "Update nightly PKGBUILD to version ${{ steps.check.outputs.latest_version }} (commit ${{ steps.check.outputs.latest_commit }})" || echo "No changes to commit"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check branch and continue or stop workflow
        if: steps.check.outputs.update_available == 'true' || inputs.force_publish
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/development" ]]; then
            echo "On development branch, stopping workflow"
            exit 0
          else
            echo "On main branch, continuing workflow"
          fi

      - name: Prepare PKGBUILD for AUR
        if: (steps.check.outputs.update_available == 'true' || inputs.force_publish) && github.ref != 'refs/heads/development'
        run: |
          mkdir -p .aur
          cp packaging/nightly/PKGBUILD .aur/PKGBUILD
          cp packaging/common/cursor.desktop packaging/common/cursor-launcher.sh .aur/
          bun scripts/update.ts --srcinfo --channel nightly --pkgbuild .aur/PKGBUILD --srcinfo-path .aur/.SRCINFO

      - name: Install SSH Key
        if: (steps.check.outputs.update_available == 'true' || inputs.force_publish) && github.ref != 'refs/heads/development'
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.KNOWN_HOSTS }}
          if_key_exists: replace

      - name: Publish AUR package
        if: (steps.check.outputs.update_available == 'true' || inputs.force_publish) && github.ref != 'refs/heads/development'
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.2
        with:
          pkgname: cursor-nightly-bin
          pkgbuild: .aur/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update nightly to version ${{ steps.check.outputs.latest_version }} (commit ${{ steps.check.outputs.latest_commit }})"
          allow_empty_commits: false
          ssh_keyscan_types: rsa,ecdsa,ed25519
          assets: |
            .aur/.SRCINFO
            .aur/cursor.desktop
            .aur/cursor-launcher.sh

      - name: Summary
        run: |
          echo "::group::Workflow Summary"
          echo "Update available: ${{ steps.check.outputs.update_available }}"
          echo "Force publish: ${{ inputs.force_publish }}"
          echo "Latest version: ${{ steps.check.outputs.latest_version }}"
          echo "Latest commit: ${{ steps.check.outputs.latest_commit }}"
          echo "::endgroup::"
